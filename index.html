<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>核子猫猫17号的页面</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.92em' font-size='70'>🚀</text></svg>">
  <style>
    :root {
      --bg: #ebf0f4;
      --panel: #ffffff;
      --border: #cfd7de;
      --text: #24292e;
      --muted: #586069;
      --accent: #0366d6;
      --font: "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121416;
        --panel: #1b1e22;
        --border: #2d333b;
        --text: #c9d1d9;
        --muted: #8b949e;
        --accent: #58a6ff;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2.5rem 3rem;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    h1 { font-size: 20px; margin-bottom: 0.4rem; }
    .sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
    a.btn {
      display: inline-block;
      padding: 10px 24px;
      background: var(--accent);
      color: #fff;
      border-radius: 5px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    a.btn:hover { opacity: 0.85; }
    .btn-list { display: flex; flex-direction: column; gap: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:48px;margin-bottom:1rem;">🚀</div>
    <h1>伊卡洛斯星服务器</h1>
    <p class="sub">by 核子猫猫17号</p>
    <div class="btn-list">
      <a class="btn" href="commands.html">📋 指令速查表</a>
      <a class="btn" href="battleship.html" style="background:#1a7f3c;">⚓ 指挥官：决战大洋</a>
    </div>
  </div>
</body>
</html>
